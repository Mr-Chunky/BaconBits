services:
  baconbits-db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    container_name: baconbits_mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - baconbits_network

  baconbits-wordpress:
    depends_on:
      - baconbits-db
    image: wordpress:latest
    container_name: baconbits_wordpress
    restart: always
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_AUTH_KEY: ${WORDPRESS_AUTH_KEY}
      WORDPRESS_SECURE_AUTH_KEY: ${WORDPRESS_SECURE_AUTH_KEY}
      WORDPRESS_LOGGED_IN_KEY: ${WORDPRESS_LOGGED_IN_KEY}
      WORDPRESS_NONCE_KEY: ${WORDPRESS_NONCE_KEY}
      WORDPRESS_AUTH_SALT: ${WORDPRESS_AUTH_SALT}
      WORDPRESS_SECURE_AUTH_SALT: ${WORDPRESS_SECURE_AUTH_SALT}
      WORDPRESS_LOGGED_IN_SALT: ${WORDPRESS_LOGGED_IN_SALT}
      WORDPRESS_NONCE_SALT: ${WORDPRESS_NONCE_SALT}
      WORDPRESS_DEBUG: 1
      WORDPRESS_DEBUG_LOG: 1
      WORDPRESS_DEBUG_DISPLAY: 1
    volumes:
      - .:/var/www/html
    networks:
      - baconbits_network

  baconbits-wpcli:
    image: wordpress:cli
    container_name: baconbits_wpcli
    depends_on:
      - baconbits-db
      - baconbits-wordpress
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
    volumes:
      - .:/var/www/html
    networks:
      - baconbits_network

  baconbits-phpmyadmin:
    image: phpmyadmin:latest
    container_name: baconbits_pma
    depends_on:
      - baconbits-db
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: baconbits-db
    networks:
      - baconbits_network

  baconbits-frontend:
    image: node:22-alpine
    container_name: baconbits_frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app # Mounts your local 'frontend' folder into the container
    working_dir: /app
    command: sh -c "npm install && exec npm run dev" # Installs dependencies and starts dev server automatically
    environment:
      - NEXT_PUBLIC_WORDPRESS_API_URL=http://baconbits-wordpress/graphql # Internal network URL for server-side fetching
      - HOSTNAME=0.0.0.0 # Set to listen on all interfaces
    depends_on:
      - baconbits-wordpress
    networks:
      - baconbits_network

volumes:
  db_data:
  wp_data:

networks:
  baconbits_network:
    driver: bridge